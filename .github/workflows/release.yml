name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          OUT="cursor-sync"
          if [ "$GOOS" = "windows" ]; then OUT="cursor-sync.exe"; fi
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/$OUT" .

          STAGE="cursor-sync_${VERSION}_${GOOS}_${GOARCH}"
          mkdir -p "dist/$STAGE"
          mv "dist/$OUT" "dist/$STAGE/"
          cp README.md LICENSE 2>/dev/null "dist/$STAGE/" || true

          cd dist
          if [ "$GOOS" = "windows" ]; then
            zip -r "${STAGE}.zip" "$STAGE"
          else
            tar -czf "${STAGE}.tar.gz" "$STAGE"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: cursor-sync-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/cursor-sync_*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
